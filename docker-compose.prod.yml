services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: instapost
      POSTGRES_USER: instapost
      POSTGRES_PASSWORD: changeme
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U instapost']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass changeme
    volumes:
      - redisdata:/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', 'changeme', 'ping']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - miniodata:/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3001/api/health']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
    ports:
      - '3000:3000'
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  telegram-bot:
    build:
      context: .
      dockerfile: packages/bot/Dockerfile
    environment:
      API_URL: http://api:3001
      API_TOKEN: instapost_service_2026
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  mcp-server:
    build:
      context: .
      dockerfile: packages/mcp/Dockerfile
    ports:
      - '3002:3002'
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  video-worker:
    build:
      context: .
      dockerfile: Dockerfile.video
    environment:
      REDIS_URL: redis://:changeme@redis:6379
      DATABASE_URL: postgresql://instapost:changeme@postgres:5432/instapost
      MINIO_ENDPOINT: minio
      MINIO_PORT: '9000'
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_USE_SSL: 'false'
      MINIO_BUCKET: instapost-images
      MINIO_PUBLIC_URL: http://72.60.148.203:9000
      SCRIPTS_DIR: /app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  miniodata:
